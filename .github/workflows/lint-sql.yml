name: lint-sql
on: [push, pull_request]
jobs:
  sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: loon-plugins
      # loon is a sibling module (go.mod replace => ../loon); check it out so
      # the module graph resolves. The lint only AST-parses — no full build.
      - uses: actions/checkout@v4
        with:
          repository: ameNZB/loon
          path: loon
      - uses: actions/setup-go@v5
        with:
          go-version-file: loon-plugins/go.mod
      - name: SQL string-building lint
        working-directory: loon-plugins
        run: go run ./scripts/lint-sql ./...
