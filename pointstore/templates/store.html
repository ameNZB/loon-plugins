{{if .Msg}}<div class="alert alert-success py-1 px-2 mb-2">{{.Msg}}</div>{{end}}
{{if .Err}}<div class="alert alert-danger py-1 px-2 mb-2">{{.Err}}</div>{{end}}
<p class="text-muted">
  Your balance: <strong>{{.Balance}}</strong> points.
  {{if .Current}} Equipped: <span class="badge bg-{{.CurrentColor}}">{{.CurrentName}}</span>{{end}}
</p>
<div class="row g-3">
  {{range .Items}}
  <div class="col-md-4">
    <div class="card"><div class="card-body">
      <h5 class="mb-1"><span class="badge bg-{{.Color}}">{{.Name}}</span></h5>
      <p class="text-muted small mb-2">{{.Cost}} points</p>
      {{if .Owned}}
        <button class="btn btn-sm btn-secondary" disabled>Equipped</button>
      {{else}}
        <form method="post" action="/p/store/buy" style="display:inline">
          <input type="hidden" name="flair" value="{{.ID}}">
          <button class="btn btn-sm btn-primary" type="submit"{{if not .Affordable}} disabled{{end}}>Buy</button>
        </form>
        {{if not .Affordable}}<span class="small text-muted ms-1">not enough</span>{{end}}
      {{end}}
    </div></div>
  </div>
  {{end}}
</div>
